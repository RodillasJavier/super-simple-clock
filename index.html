<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Super Simple Clock</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          fontFamily: {
            sans: ['Inter', 'system-ui', 'sans-serif'],
            mono: ['"JetBrains Mono"', 'monospace'],
          },
        },
      };
    </script>

    <style>
      /* Compound selectors and pseudo-elements that can't be expressed as utilities */
      .mode-btn.active {
        color: white;
      }
      .lbl.on {
        color: white;
      }
      .editable {
        cursor: pointer;
      }
      .editable:hover {
        color: rgba(214, 211, 209, 0.75);
      }
      #mode-pill {
        transition: left 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
      }
      #edit-mm,
      #edit-ss {
        -moz-appearance: textfield;
        appearance: textfield;
      }
      #edit-mm::-webkit-inner-spin-button,
      #edit-mm::-webkit-outer-spin-button,
      #edit-ss::-webkit-inner-spin-button,
      #edit-ss::-webkit-outer-spin-button {
        -webkit-appearance: none;
      }
      @keyframes sw-pulse {
        0%,
        100% {
          opacity: 0.4;
        }
        50% {
          opacity: 1;
        }
      }
      .bar-track.sw-active::after {
        content: '';
        position: absolute;
        inset: 0;
        border-radius: 9999px;
        background: rgba(255, 255, 255, 0.04);
        animation: sw-pulse 2s ease-in-out infinite;
      }
    </style>
  </head>

  <body class="flex min-h-screen items-center justify-center bg-stone-900 p-6">
    <div class="relative flex h-full w-full max-w-[448px] flex-col items-center">
      <!-- Fullscreen -->
      <button
        id="fs-btn"
        aria-label="Enter fullscreen"
        class="absolute right-0 top-0 flex h-10 w-10 cursor-pointer items-center justify-center rounded-lg border-0 bg-transparent text-white/30 transition-colors duration-200 hover:bg-white/5 hover:text-white/50"
      >
        <svg
          id="icon-expand"
          xmlns="http://www.w3.org/2000/svg"
          width="16"
          height="16"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <polyline points="15 3 21 3 21 9" />
          <polyline points="9 21 3 21 3 15" />
          <line x1="21" y1="3" x2="14" y2="10" />
          <line x1="3" y1="21" x2="10" y2="14" />
        </svg>
        <svg
          id="icon-compress"
          xmlns="http://www.w3.org/2000/svg"
          width="16"
          height="16"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
          class="hidden"
        >
          <polyline points="4 14 10 14 10 20" />
          <polyline points="20 10 14 10 14 4" />
          <line x1="10" y1="14" x2="3" y2="21" />
          <line x1="21" y1="3" x2="14" y2="10" />
        </svg>
      </button>

      <!-- Mode toggle -->
      <div class="relative mb-12 flex w-full max-w-[240px] rounded-full bg-white/5 p-1">
        <button
          class="mode-btn active relative z-10 flex-1 cursor-pointer rounded-full border-0 bg-transparent px-4 py-2 text-sm font-medium text-white/50 transition-colors duration-200 hover:text-white/80"
          data-mode="pomodoro"
        >
          Pomodoro
        </button>

        <button
          class="mode-btn relative z-10 flex-1 cursor-pointer rounded-full border-0 bg-transparent px-4 py-2 text-sm font-medium text-white/50 transition-colors duration-200 hover:text-white/80"
          data-mode="stopwatch"
        >
          Stopwatch
        </button>

        <div
          id="mode-pill"
          class="absolute bottom-1 top-1 z-0 w-[calc(50%-4px)] rounded-full bg-white/10"
          style="left: 4px"
        ></div>
      </div>

      <!-- Timer -->
      <div class="flex w-full flex-col items-center">
        <div
          id="phase-label"
          class="mb-6 flex h-5 items-center gap-2 text-[13px] font-medium uppercase tracking-[0.10em] text-white/50"
        >
          <span class="lbl on transition-colors duration-200" id="lbl-focus">Focus</span>
          <span class="inline-block h-1 w-1 rounded-full bg-white/20"></span>
          <span class="lbl transition-colors duration-200" id="lbl-break">Break</span>
        </div>

        <div
          id="time-display"
          class="editable select-none font-mono text-[clamp(72px,15vw,96px)] font-bold tabular-nums leading-none tracking-tighter text-stone-300 transition-colors duration-150"
        >
          25:00
        </div>

        <div
          id="time-edit"
          class="items-center font-mono text-[clamp(72px,15vw,96px)] font-bold leading-none tracking-tighter"
          style="display: none"
        >
          <input
            id="edit-mm"
            type="number"
            min="0"
            max="99"
            class="w-[2.3ch] border-0 border-b-2 border-white/30 bg-transparent p-0 text-center text-stone-300 outline-none [font:inherit] [letter-spacing:inherit] focus:border-white/70"
          />

          <span class="mx-px text-stone-300">:</span>

          <input
            id="edit-ss"
            type="number"
            min="0"
            max="59"
            class="w-[2.3ch] border-0 border-b-2 border-white/30 bg-transparent p-0 text-center text-stone-300 outline-none [font:inherit] [letter-spacing:inherit] focus:border-white/70"
          />
        </div>

        <div id="completed-count" class="mt-4 h-[18px] text-xs font-medium text-white/30">
          Completed: 0
        </div>

        <div class="my-12 w-full">
          <div
            id="bar-track"
            class="bar-track relative h-3 overflow-visible rounded-full bg-stone-900"
          >
            <div
              id="bar-fill"
              class="absolute bottom-0 left-0 top-0 w-0 overflow-visible rounded-full"
            >
              <div class="absolute inset-0 overflow-hidden rounded-full">
                <div id="bar-fill-inner" class="absolute inset-0 rounded-full"></div>
              </div>

              <div
                id="bar-glow"
                class="pointer-events-none absolute -right-0.5 top-1/2 h-4 w-4 -translate-y-1/2 rounded-full opacity-0 transition-opacity duration-300"
              ></div>
            </div>
          </div>
        </div>

        <div class="flex items-center gap-6">
          <button
            id="reset-btn"
            aria-label="Reset"
            class="flex h-12 w-12 cursor-pointer items-center justify-center rounded-full border-0 bg-white/5 text-white/50 transition-colors duration-200 hover:bg-white/10 hover:text-white"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="20"
              height="20"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8" />
              <path d="M3 3v5h5" />
            </svg>
          </button>

          <button
            id="play-btn"
            aria-label="Start"
            class="flex h-16 w-16 cursor-pointer items-center justify-center rounded-full border-0 bg-white text-black transition-transform duration-150 hover:scale-105 active:scale-95"
          >
            <svg
              id="icon-play"
              xmlns="http://www.w3.org/2000/svg"
              width="28"
              height="28"
              viewBox="0 0 24 24"
              fill="currentColor"
              style="margin-left: 3px"
            >
              <polygon points="5,3 19,12 5,21" />
            </svg>
            <svg
              id="icon-pause"
              xmlns="http://www.w3.org/2000/svg"
              width="28"
              height="28"
              viewBox="0 0 24 24"
              fill="currentColor"
              class="hidden"
            >
              <rect x="6" y="4" width="4" height="16" rx="1" />
              <rect x="14" y="4" width="4" height="16" rx="1" />
            </svg>
          </button>

          <div class="h-12 w-12"></div>
        </div>
      </div>
    </div>

    <script src="script.js" defer></script>
  </body>
</html>
